<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pesquisa de Satisfação - Stefanini</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Fonte Poppins do Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body { background: #eff1f3; font-family: 'Poppins', Arial, sans-serif; min-height: 100vh; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; } .glass-container { background: rgba(227, 231, 233, 0.7); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.18); max-width: 600px; width: 100%; padding: 40px 30px 30px 30px; margin: 40px 0; } .logo { width: 90px; height: 90px; object-fit: contain; display: block; margin-left: auto; margin-right: auto; margin-bottom: 18px; margin-top: -10px; border-radius: 18px; background: #fff; box-shadow: 0 2px 8px #0001; padding: 8px; } .imagem-centralizada { display: block; margin: 0 auto 24px auto; max-width: 100%; border-radius: 16px; box-shadow: 0 2px 8px #0001; } .titulo { font-family: 'Poppins', Arial, sans-serif; color: #2f4463; font-size: 25px; font-weight: 700; text-align: center; margin-bottom: 10px; } .subtitulo { font-family: 'Poppins', Arial, sans-serif; color: #2f4463; font-size: 14px; text-align: center; margin-bottom: 18px; } .texto-explicativo { font-family: 'Poppins', Arial, sans-serif; color: #2f4463; font-size: 12px; text-align: center; margin-bottom: 25px; } label, .form-label, .form-select, .form-control, .form-range { font-family: 'Poppins', Arial, sans-serif; color: #2f4463; font-size: 14px; } .btn-primary { background: #2f4463; border: none; font-family: 'Poppins', Arial, sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 1px; } .btn-primary:hover { background: #1d2c45; } </style>
</head>
<body>
  <div class="glass-container">
    <!-- Logo da empresa -->
    <img src="https://github.com/juliacamposgl-a11y/pesquisa-de-satisfacao-stefanini/raw/main/logo-stefanini.jpeg" class="logo" alt="Logo Stefanini">
    <!-- Imagem centralizada -->
    <img src="https://github.com/juliacamposgl-a11y/pesquisa-de-satisfacao-stefanini/raw/main/videoframe_stefanini.png" alt="Imagem Stefanini" class="imagem-centralizada">
    <div class="titulo">Pesquisa de Satisfação</div>
    <div class="subtitulo">Sua opinião é muito importante para nós!</div>
    <div class="texto-explicativo">
      Por favor, responda as perguntas abaixo para nos ajudar a melhorar nossos serviços.
    </div>
    <form action="https://formspree.io/f/mnjgjqyw" method="POST">
      <label class="form-label mt-3">1. Em uma escala de 0 a 10, quão satisfeito você ficou com a proposta apresentada?</label>
      <input type="range" class="form-range" name="satisfacao" min="0" max="10" required>
      
      <label class="form-label mt-3">2. Em uma escala de 0 a 10, como você avalia a funcionalidade da proposta diante do problema apresentado?</label>
      <input type="range" class="form-range" name="funcionalidade" min="0" max="10" required>
      
      <label class="form-label mt-3">3. Em termos práticos, como você acredita que a proposta pode melhorar o desempenho dos colaboradores?</label>
      <textarea class="form-control" name="melhoria" required></textarea>
      
      <label class="form-label mt-3">4. Na sua opinião, a apresentação esclareceu todos os pontos necessários?</label>
      <select class="form-select" name="esclareceu" required>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
      </select>
      
      <label class="form-label mt-3">5. Na sua opinião, quais pontos devem ser acrescentados para melhoria?</label>
      <textarea class="form-control" name="pontos_melhoria"></textarea>
      
      <button type="submit" class="btn btn-primary mt-4 w-100">Enviar</button>
    </form>
  </div>
</body>
</html>
